<section class="p-5 bg-[#f4f1ed]">
    <!-- HEADER -->
    <div class="flex items-start justify-between mb-5">
      <div>
        <h1 class="page-title">Manage users</h1>
        <p class="text-xs text-gray-400 mt-1">View and manage registered donors</p>
      </div>
      <button class="btn-primary">
        <i class="fa-solid fa-plus text-xs"></i>
        Add user
      </button>
    </div>
  

    <!-- SEARCH -->
    <div class="bg-white rounded-xl border border-[#ede8e2] px-4 py-3
                flex items-center gap-3 mb-3 transition-colors
                focus-within:border-[#A32D2D]">
      <i class="fa-solid fa-magnifying-glass text-gray-300 text-sm"></i>
      <input
        #searchInput
        type="text"
        placeholder="Search by name, blood type or phone"
        class="w-full outline-none text-sm text-gray-700 placeholder-gray-300 bg-transparent"
        (input)="onSearch(searchInput.value)"
      >
      @if (searchQuery) {
        <i
          class="fa-solid fa-xmark text-gray-300 text-sm cursor-pointer hover:text-[#A32D2D] transition-colors"
          (click)="searchInput.value = ''; onSearch('')"
        ></i>
      }
    </div>
  
    <!-- TABLE -->
    <div class="data-table">
      <p-table [value]="filteredUsers" [tableStyle]="{'min-width':'60rem'}"
               [paginator]="true" [rows]="6" [rowsPerPageOptions]="[5,10,20]">
        <ng-template #header>
          <tr>
            <th class="text-left!">Name</th>
            <th>Blood type</th>
            <th>Phone</th>
            <th>Last donation</th>
            <th>Points</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </ng-template>
        <ng-template #body let-user>
          <tr>
            <td class="font-medium text-gray-900! text-left!">{{ user.fullName }}</td>
            <td><span class="bt-pill">{{ user.bloodType }}</span></td>
            <td class="text-gray-400!">{{ user.phoneNumber }}</td>
            <td class="text-gray-400!">{{ user.lastDonation| date:'short'}} </td>
            <td class="font-medium text-gray-700!">{{ user.points }}</td>
            <td>
              <span class="status-pill">
                {{ user.status }}
              </span>
            </td>
            <td>
              <div class="flex items-center justify-center gap-1.5">
                <button class="w-7 h-7 rounded-lg border border-[#ede8e2] bg-white
                               flex items-center justify-center cursor-pointer
                               hover:bg-[#f4f1ed] transition-colors"
                        style="color:#185FA5">
                  <i class="fa-regular fa-eye text-xs"></i>
                </button>
                <button class="w-7 h-7 rounded-lg border border-[#ede8e2] bg-white
                               flex items-center justify-center cursor-pointer
                               hover:bg-[#f4f1ed] transition-colors"
                        style="color:#3B6D11">
                  <i class="fa-regular fa-circle-check text-xs"></i>
                </button>
                <button class="w-7 h-7 rounded-lg border border-[#ede8e2] bg-white
                               flex items-center justify-center cursor-pointer
                               hover:bg-[#f4f1ed] transition-colors"
                        style="color:#854F0B">
                  <i class="fa-solid fa-award text-xs"></i>
                </button>
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </section>

<p-toast position="top-right" />

<section class="h-screen flex justify-center items-center bg-[#f7f3f0]">
  <div class="login-container w-full lg:w-96 m-5 lg:m-0">
    <!-- Red header -->
    <div class="login-header">
      <div class="flex justify-center items-center gap-3 mb-4">
        <img src="assets/images/logo.png" alt="logo" class="w-10 h-10" />
      </div>
      <h1 class="text-white text-center text-2xl mb-1" style="font-family: 'Fraunces', serif; font-weight: 500">
        Welcome back
      </h1>
      <p class="text-white/60 text-center text-sm font-light">Sign in to your Hospital dashboard</p>
    </div>

    <!-- Form body -->
    <div class="login-body">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="flex flex-col gap-5">

          <!-- Email -->
          <div>
            <label class="field-label" for="email">Email address</label>
            <div class="input-row" [class.border-red-400]="emailInvalid">
              <img class="w-4 h-4 opacity-40" src="./assets/icons/email.png" alt="" />
              <input
                class="w-full bg-transparent text-sm outline-none text-gray-800 placeholder-gray-300 py-1"
                type="email"
                id="email"
                autofocus
                placeholder="doctor@hospital.org"
                formControlName="userName"
              />
            </div>
            @if (emailInvalid) {
              <p class="text-red-500 text-xs mt-1">Please enter a valid email.</p>
            }
          </div>

          <!-- Password -->
          <div>
            <label class="field-label" for="password">Password</label>
            <div class="input-row" [class.border-red-400]="passwordInvalid">
              <img class="w-4 h-4 opacity-40" src="./assets/icons/password.png" alt="" />
              <input
                class="w-full bg-transparent text-sm outline-none text-gray-800 placeholder-gray-300 py-1"
                [type]="passwordVisibility ? 'text' : 'password'"
                id="password"
                placeholder="••••••••"
                formControlName="password"
              />
              <img
                class="w-4 h-4 cursor-pointer opacity-40 hover:opacity-80 transition-opacity"
                [src]="passwordVisibility ? 'assets/icons/eye.png' : 'assets/icons/eye-close.png'"
                (click)="togglePasswordVisibility()"
                alt="toggle"
              />
            </div>
            @if (passwordInvalid) {
              <p class="text-red-500 text-xs mt-1">Password is required.</p>
            }
          </div>
        </div>

        <div class="flex justify-end mt-4 mb-6">
          <a class="text-xs text-gray-400 hover:text-[#A32D2D] transition-colors" href="#">
            Forgot password?
          </a>
        </div>

        <button
          type="submit"
          [disabled]="isLoading"
          class="btn-login w-full text-white py-3 text-sm font-medium flex items-center justify-center gap-2 cursor-pointer disabled:opacity-60 disabled:cursor-not-allowed"
        >
          @if (isLoading) {
            <i class="fa-solid fa-spinner animate-spin"></i>
            Signing in...
          } @else {
            Sign in
          }
        </button>
      </form>
    </div>

    <!-- Footer -->
    <div class="login-footer flex items-center justify-center gap-2">
      <span class="w-1.5 h-1.5 rounded-full bg-[#A32D2D]"></span>
      <span class="text-xs text-gray-400 tracking-widest uppercase font-medium">
        Secure Hospital access
      </span>
      <span class="w-1.5 h-1.5 rounded-full bg-[#A32D2D]"></span>
    </div>
  </div>
</section>
